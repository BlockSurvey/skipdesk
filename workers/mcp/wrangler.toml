name = "skip-desk-mcp"
main = "src/index.ts"
compatibility_date = "2026-06-19"
compatibility_flags = ["nodejs_compat"]

# D1 — the same database the schema/migrations live in (db/).
[[d1_databases]]
binding = "DB"
database_name = "skip-desk-db"
database_id = "a499fc75-63a9-40e7-93c2-45a08b4d9299"

# R2 — raw uploaded knowledge-base document blobs (namespaced by business_id in the key).
[[r2_buckets]]
binding = "DOCS"
bucket_name = "skip-desk-docs"

# Workers AI — document→markdown conversion (toMarkdown) + text embeddings (bge).
[ai]
binding = "AI"

# Web voice widget (Vapi). The assistant id is non-secret (it's in the dashboard URL),
# so it lives here as a plain var. VAPI_PUBLIC_KEY and VAPI_WEBHOOK_SECRET are set as
# secrets (`wrangler secret put …`): the public key is returned to the browser by
# /widget/config on purpose, but kept out of git; the webhook secret must stay secret.
[vars]
VAPI_ASSISTANT_ID = "a07fbcb4-5b92-4cb1-8606-b8a50af869ad"
# Shared platform inbound number (E.164), bound to the same assistant in Vapi.
# Per-business numbers live in the phone_numbers table and override this when present.
VAPI_PHONE_NUMBER = "+18052193184"

# Durable Object that backs the McpAgent session (required by the Agents SDK).
[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "SkipDeskMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SkipDeskMCP"]
